# Organism-level components — full-page chunks composed from molecular + atomic.
# Consumed after molecular.yaml during /design ds-init / ds-update.

version: 1
level: organism
namespace: ds
depends_on: [molecular, atomic]

components:
  - name: AppHeader
    description: Top-of-page header with brand, nav links, and user slot.
    props:
      title:
        type: string
        required: true
      nav_links:
        type: array
        items: string
        default: []
      user_label:
        type: string
        required: false
    style:
      width: full
      height: 64
      padding_x: "{{tokens.spacing.lg}}"
      background: "{{tokens.color.surface}}"
      border_bottom: "{{tokens.color.border}}"
    children:
      - ref: Label
        bind: { text: "{{props.title}}", size: lg }
      - ref: Label
        for_each: "{{props.nav_links}}"
        bind: { text: "{{item}}", size: sm, variant: muted }
      - ref: Button
        when: "{{props.user_label}}"
        bind: { label: "{{props.user_label}}", variant: ghost }
    layout:
      direction: row
      align: between
      gap: "{{tokens.spacing.md}}"

  - name: AuthCard
    description: Centered auth surface — used for signup, login, password reset.
    props:
      heading:
        type: string
        required: true
      subheading:
        type: string
        required: false
      fields:
        type: array
        items: object
        required: true
      primary_action:
        type: string
        required: true
      secondary_action:
        type: string
        required: false
      state:
        type: enum
        values: [default, loading, error]
        default: default
    children:
      - ref: Card
        bind: { padding: lg, elevation: md }
        children:
          - ref: Label
            bind: { text: "{{props.heading}}", size: xl }
          - ref: Label
            when: "{{props.subheading}}"
            bind: { text: "{{props.subheading}}", size: sm, variant: muted }
          - ref: FormField
            for_each: "{{props.fields}}"
            bind:
              label: "{{item.label}}"
              placeholder: "{{item.placeholder}}"
              type: "{{item.type}}"
              state: "{{props.state == 'error' ? 'error' : 'default'}}"
          - ref: ButtonGroup
            bind: { alignment: end }
            slot.buttons:
              - ref: Button
                when: "{{props.secondary_action}}"
                bind: { label: "{{props.secondary_action}}", variant: ghost }
              - ref: Button
                bind:
                  label: "{{props.primary_action}}"
                  variant: primary
                  state: "{{props.state == 'loading' ? 'loading' : 'default'}}"
    style:
      width: 440
      align: center

  - name: EmptyState
    description: Placeholder shown when a list has no items.
    props:
      icon:
        type: string
        default: "inbox"
      heading:
        type: string
        required: true
      description:
        type: string
        required: false
      action_label:
        type: string
        required: false
    children:
      - ref: Icon
        bind: { name: "{{props.icon}}", size: 48 }
      - ref: Label
        bind: { text: "{{props.heading}}", size: lg }
      - ref: Label
        when: "{{props.description}}"
        bind: { text: "{{props.description}}", size: sm, variant: muted }
      - ref: Button
        when: "{{props.action_label}}"
        bind: { label: "{{props.action_label}}", variant: primary }
    layout:
      direction: column
      align: center
      gap: "{{tokens.spacing.md}}"
