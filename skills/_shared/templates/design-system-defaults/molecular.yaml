# Molecular-level components — composed from atomic primitives.
# Consumed after atomic.yaml during /design ds-init / ds-update.

version: 1
level: molecular
namespace: ds
depends_on: [atomic]

components:
  - name: FormField
    description: Label + Input + optional error message.
    props:
      label:
        type: string
        required: true
      placeholder:
        type: string
        required: true
      type:
        type: enum
        values: [text, email, password, number]
        default: text
      state:
        type: enum
        values: [default, focus, error, disabled]
        default: default
      error_message:
        type: string
        required: false
    children:
      - ref: Label
        bind: { text: "{{props.label}}", size: sm, variant: default }
      - ref: Input
        bind:
          placeholder: "{{props.placeholder}}"
          type: "{{props.type}}"
          state: "{{props.state}}"
      - ref: Label
        when: "{{props.state == 'error'}}"
        bind:
          text: "{{props.error_message}}"
          size: xs
          variant: danger
    layout:
      direction: column
      gap: "{{tokens.spacing.xs}}"

  - name: Card
    description: Content container with surface background, rounded corners, shadow.
    props:
      padding:
        type: enum
        values: [sm, md, lg]
        default: md
      elevation:
        type: enum
        values: [flat, sm, md, lg]
        default: sm
    style:
      background: "{{tokens.color.surface}}"
      radius: "{{tokens.radius.lg}}"
      shadow:
        bind:
          flat: "none"
          sm: "{{tokens.shadow.sm}}"
          md: "{{tokens.shadow.md}}"
          lg: "{{tokens.shadow.lg}}"
      padding:
        bind:
          sm: "{{tokens.spacing.md}}"
          md: "{{tokens.spacing.lg}}"
          lg: "{{tokens.spacing.xl}}"

  - name: ButtonGroup
    description: Horizontal row of buttons, aligned right by default.
    props:
      alignment:
        type: enum
        values: [start, center, end, between]
        default: end
      gap:
        type: enum
        values: [sm, md, lg]
        default: md
    children_slot: buttons
    layout:
      direction: row
      align: "{{props.alignment}}"
      gap:
        bind:
          sm: "{{tokens.spacing.sm}}"
          md: "{{tokens.spacing.md}}"
          lg: "{{tokens.spacing.lg}}"

  - name: Toast
    description: Inline status banner — used for empty/error/success states.
    props:
      variant:
        type: enum
        values: [info, success, warning, danger]
        default: info
      title:
        type: string
        required: true
      description:
        type: string
        required: false
    style:
      width: 480
      padding: "{{tokens.spacing.md}}"
      radius: "{{tokens.radius.md}}"
      background:
        bind:
          info: "{{tokens.color.surface-muted}}"
          success: "rgba(16,185,129,0.1)"
          warning: "rgba(245,158,11,0.1)"
          danger: "rgba(239,68,68,0.1)"
