name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  schemas:
    name: JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install ajv-cli
        run: npm i -g ajv-cli

      - name: Validate fixtures vs schemas
        run: bash tests/validate-schemas.sh

      - name: Test load-config.sh
        run: bash tests/test-load-config.sh

  shellcheck:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run shellcheck
        run: |
          # Shell files only (skip .tpl templates which use {{vars}} placeholders)
          shopt -s globstar nullglob
          files=(skills/_shared/**/*.sh tests/**/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts to check yet."
            exit 0
          fi
          shellcheck "${files[@]}"

  json-syntax:
    name: JSON syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate JSON files parse
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! jq empty "$f" >/dev/null 2>&1; then
              echo "INVALID JSON: $f"
              fail=1
            fi
          done < <(find . -name '*.json' -not -path './node_modules/*' -not -path './.git/*')
          exit $fail
